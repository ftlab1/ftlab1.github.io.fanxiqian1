<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风控鹰眼 v4.1 - 修复版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>

    <style>
        :root {
            --bg-deep: #020617;
            --neon-blue: #3b82f6;
            --neon-cyan: #22d3ee;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(59, 130, 246, 0.2);
        }

        body {
            background-color: var(--bg-deep);
            color: #e2e8f0;
            font-family: 'Inter', 'PingFang SC', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* 扫描线动画 */
        .scanning::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(59, 130, 246, 0.05), transparent);
            height: 100px; width: 100%; animation: scanline 4s linear infinite; pointer-events: none;
        }
        @keyframes scanline { 0% { top: -10%; } 100% { top: 110%; } }

        /* 系统界面初始隐藏 */
        #app-container { display: none; opacity: 0; }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(59,130,246,0.2) 0%, transparent 100%);
            border-left: 4px solid var(--neon-cyan);
            color: #fff;
        }

        .loader-bar { height: 2px; width: 0%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: width 0.1s linear; }
        
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="scanning">

    <div id="landing-page" class="fixed inset-0 z-[100] bg-[#020617] overflow-y-auto">
        <header class="w-full py-6 px-12 flex justify-between items-center z-10 sticky top-0 bg-black/40 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-cyan-500/10 flex items-center justify-center border border-cyan-500/50">
                    <i class="fa-solid fa-shield-halved text-cyan-400"></i>
                </div>
                <span class="text-xl font-black tracking-tighter text-white">HAWKEYE <span class="text-cyan-400">鹰眼 4.1</span></span>
            </div>
            <button onclick="openLogin()" class="px-6 py-2 bg-white text-black text-sm font-bold rounded-full hover:bg-cyan-400 transition transform hover:scale-105">
                进入控制台
            </button>
        </header>

        <main class="max-w-7xl mx-auto px-6 pt-32 text-center">
            <h1 class="text-6xl font-black mb-8 text-white leading-tight">
                AI 驱动的全链路<br><span class="text-cyan-400">反洗钱监测引擎</span>
            </h1>
            <p class="text-slate-400 text-xl max-w-2xl mx-auto mb-12">集成大模型语义分析与图计算技术，实时穿透复杂资金网络。</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-panel p-8">仪表盘态势感知</div>
                <div class="glass-panel p-8">语义黑话识别</div>
                <div class="glass-panel p-8">资金链路溯源</div>
            </div>
        </main>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-black/90 backdrop-blur-2xl z-[200] hidden items-center justify-center transition-opacity duration-300">
        <div class="w-96 p-8 glass-panel text-center">
            <h2 class="text-2xl font-bold text-white mb-8">身份鉴权</h2>
            <form onsubmit="handleLogin(event)" class="space-y-6">
                <input type="text" value="ADMIN_SN" class="w-full bg-black/40 border border-slate-700 p-3 rounded-lg text-white" placeholder="工号" required>
                <input type="password" value="********" class="w-full bg-black/40 border border-slate-700 p-3 rounded-lg text-white" placeholder="密码" required>
                <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg">初始化系统</button>
            </form>
        </div>
    </div>

    <div id="loader-screen" class="fixed inset-0 bg-[#020617] z-[300] hidden flex-col items-center justify-center transition-opacity duration-500">
        <div class="mb-6"><i class="fa-solid fa-sync fa-spin text-4xl text-cyan-400"></i></div>
        <div id="loader-text" class="text-xs font-mono text-cyan-500/70 mb-4 tracking-[0.3em]">内核注入中... 0%</div>
        <div class="w-64 h-[2px] bg-slate-800 rounded-full">
            <div id="loader-bar" class="loader-bar"></div>
        </div>
    </div>

    <div id="app-container" class="flex h-screen w-full overflow-hidden">
        <aside class="w-64 bg-[#0b1121] border-r border-white/5 flex flex-col z-50">
            <div class="h-20 flex items-center px-6 gap-3">
                <i class="fa-solid fa-eye text-cyan-400"></i>
                <span class="font-bold">HAWKEYE <span class="text-[10px] block opacity-50">v4.1</span></span>
            </div>
            <nav class="flex-1 py-4">
                <a href="javascript:void(0)" onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item active flex items-center px-6 py-4 text-slate-400">
                    <i class="fa-solid fa-gauge-high w-8"></i> 态势驾驶舱
                </a>
                <a href="javascript:void(0)" onclick="switchTab('semantics')" id="nav-semantics" class="nav-item flex items-center px-6 py-4 text-slate-400">
                    <i class="fa-solid fa-microchip w-8"></i> 语义实验室
                </a>
                <a href="javascript:void(0)" onclick="switchTab('investigation')" id="nav-investigation" class="nav-item flex items-center px-6 py-4 text-slate-400">
                    <i class="fa-solid fa-magnifying-glass-nodes w-8"></i> 追踪溯源
                </a>
            </nav>
            <div class="p-6 border-t border-white/5 bg-black/20 text-xs">
                <p class="text-cyan-500 font-bold">孙千越</p>
                <p class="text-slate-500">首席安全分析师</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#020617] relative">
            <header class="h-16 border-b border-white/5 bg-[#0b1121]/50 backdrop-blur flex items-center justify-between px-8">
                <div class="text-xs text-emerald-500"><i class="fa-solid fa-circle text-[8px] animate-pulse mr-2"></i>系统在线</div>
                <button onclick="location.reload()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-power-off"></i></button>
            </header>

            <div class="flex-1 overflow-y-auto p-8">
                <div id="view-dashboard" class="space-y-6 animate-fade-in">
                    <div class="grid grid-cols-4 gap-6">
                        <div class="glass-panel p-6">
                            <p class="text-[10px] text-slate-500">风险拦截</p>
                            <h3 class="text-2xl font-bold mt-2">1,284 <span class="text-xs text-red-400">+5.2%</span></h3>
                            <div id="c1" class="h-16 mt-2"></div>
                        </div>
                        <div class="glass-panel p-6">
                            <p class="text-[10px] text-slate-500">模型准确率</p>
                            <h3 class="text-2xl font-bold mt-2 text-cyan-400">99.82%</h3>
                            <div class="w-full bg-slate-800 h-1 mt-6"><div class="bg-cyan-500 h-full w-[99%]"></div></div>
                        </div>
                        <div class="glass-panel p-6">
                            <p class="text-[10px] text-slate-500">活跃Agent数</p>
                            <h3 class="text-2xl font-bold mt-2">12 <span class="text-xs text-slate-500">Clusters</span></h3>
                        </div>
                        <div class="glass-panel p-6">
                            <p class="text-[10px] text-slate-500">洗钱攻击频率</p>
                            <h3 class="text-2xl font-bold mt-2 text-purple-400">低风险</h3>
                        </div>
                    </div>
                    <div class="glass-panel h-96 p-6">
                        <h4 class="font-bold mb-4">实时全球资金流向监测</h4>
                        <div id="main-map" class="h-full w-full"></div>
                    </div>
                </div>

                <div id="view-semantics" class="hidden space-y-6 animate-fade-in">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="glass-panel p-6 h-[500px]">
                            <h4 class="font-bold mb-6">隐意语义聚类图</h4>
                            <div id="sem-chart" class="h-full w-full"></div>
                        </div>
                        <div class="glass-panel p-6 bg-black/40 font-mono text-xs overflow-y-auto h-[500px]">
                            <p class="text-cyan-400 mb-2">>>> 启动大模型解析引擎...</p>
                            <div id="log-box"></div>
                        </div>
                    </div>
                </div>

                <div id="view-investigation" class="hidden space-y-6 animate-fade-in">
                    <div class="glass-panel p-6 h-[600px]">
                        <h4 class="font-bold mb-4">资金穿透拓扑图</h4>
                        <div id="rel-chart" class="h-full w-full"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. 登录与加载流程修复
        function openLogin() {
            const modal = document.getElementById('login-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => modal.style.opacity = '1', 10);
        }

        function handleLogin(e) {
            e.preventDefault();
            const modal = document.getElementById('login-modal');
            const landing = document.getElementById('landing-page');
            const loader = document.getElementById('loader-screen');
            const app = document.getElementById('app-container');
            const bar = document.getElementById('loader-bar');
            const ltext = document.getElementById('loader-text');

            // 隐藏登录框
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.classList.add('hidden');
                landing.classList.add('hidden');
                
                // 显示加载页
                loader.classList.remove('hidden');
                loader.classList.add('flex');
                
                let progress = 0;
                const timer = setInterval(() => {
                    progress += Math.floor(Math.random() * 15) + 5;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(timer);
                        
                        // 关键修复：延迟后切换到 App
                        setTimeout(() => {
                            loader.style.opacity = '0';
                            setTimeout(() => {
                                loader.classList.add('hidden');
                                app.style.display = 'flex'; // 强制改为 flex
                                setTimeout(() => {
                                    app.style.opacity = '1';
                                    initCharts(); // 渲染图表
                                }, 50);
                            }, 500);
                        }, 500);
                    }
                    bar.style.width = progress + '%';
                    ltext.innerText = `内核注入中... ${progress}%`;
                }, 150);
            }, 300);
        }

        // 2. 菜单切换修复
        function switchTab(tabId) {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('nav-' + tabId).classList.add('active');
            
            // 触发 ECharts 重绘
            window.dispatchEvent(new Event('resize'));
        }

        // 3. 图表初始化
        function initCharts() {
            // 简易地图
            const map = echarts.init(document.getElementById('main-map'));
            map.setOption({
                xAxis: { show: false, min:0, max:100 },
                yAxis: { show: false, min:0, max:100 },
                series: [{
                    type: 'lines',
                    effect: { show: true, period: 3, trailLength: 0.5, color: '#22d3ee', symbolSize: 3 },
                    lineStyle: { color: '#22d3ee', opacity: 0.2, curveness: 0.3 },
                    data: [
                        { coords: [[10, 10], [50, 50]] },
                        { coords: [[90, 80], [50, 50]] },
                        { coords: [[20, 80], [50, 50]] }
                    ]
                }]
            });

            // 语义聚类
            const sem = echarts.init(document.getElementById('sem-chart'));
            sem.setOption({
                series: [{
                    type: 'scatter',
                    data: Array.from({length: 40}, () => [Math.random()*10, Math.random()*10]),
                    itemStyle: { color: '#22d3ee' }
                }]
            });

            // 关系图
            const rel = echarts.init(document.getElementById('rel-chart'));
            rel.setOption({
                series: [{
                    type: 'graph',
                    layout: 'force',
                    symbolSize: 30,
                    data: [{name:'主账户', itemStyle:{color:'#ef4444'}}, {name:'A'}, {name:'B'}, {name:'C'}],
                    links: [{source:'主账户', target:'A'}, {source:'主账户', target:'B'}, {source:'主账户', target:'C'}],
                    label: { show: true, color: '#fff', fontSize: 10 }
                }]
            });

            window.addEventListener('resize', () => {
                map.resize(); sem.resize(); rel.resize();
            });

            // 模拟日志
            const logBox = document.getElementById('log-box');
            setInterval(() => {
                const p = document.createElement('p');
                p.className = 'text-slate-500 mb-1';
                p.innerText = `[${new Date().toLocaleTimeString()}] 检测到特征偏移: ${Math.random().toFixed(4)}`;
                logBox.prepend(p);
                if(logBox.children.length > 15) logBox.lastChild.remove();
            }, 2000);
        }
    </script>
</body>
</html>
